# Experiment 0 (priority): Sun + shadow — all illumination conditions
# Hypothesis: More data helps despite quality variance. Lowest exp number = run first in --all.
experiment_name: "exp_00_all_tiles"
run_intention: "all illum: sun+shadow tiles"
mode: "production"

target_mode: "binary"

training:
  loss_function: "bce"
  learning_rate: 0.00003
  batch_size: 16
  num_epochs: 150
  early_stopping_patience: 15
  early_stopping_min_delta: 0
  lr_scheduler_patience: 6
  lr_scheduler_factor: 0.5
  max_grad_norm: 1.0
  max_overfit_gap_ratio: 0.6

data:
  tile_size: 512
  train_subsample_ratio: 1.0
  illumination_filter: "all"
  augmentation: false
  use_rgb: true
  use_dem: false
  use_slope: false
  use_segmentation_layer: true
