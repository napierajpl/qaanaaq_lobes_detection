# Experiment 5: Unfreeze encoder after epoch 10 (same regularization as exp_04)
# Hypothesis: fine-tuning the encoder after warmup pushes past the val_loss/iou ceiling.
experiment_name: "exp_05_unfreeze_ep10"
run_intention: "vs exp04: unfreeze encoder after epoch 10"
mode: "production"

init_weights_from: "data/models/production/best_model.pt"

target_mode: "binary"

model:
  encoder:
    freeze_encoder: true
    unfreeze_after_epoch: 10

training:
  loss_function: "bce"
  bce_pos_weight: 5.0
  learning_rate: 0.000015
  batch_size: 16
  num_epochs: 200
  early_stopping_patience: 20
  early_stopping_min_delta: 0
  lr_scheduler_patience: 6
  lr_scheduler_factor: 0.5
  max_grad_norm: 1.0
  weight_decay: 0.002
  max_overfit_gap_ratio: 0.6

data:
  tile_size: 512
  train_subsample_ratio: 0.8
  dataloader_num_workers: 0
  illumination_filter: "sun"
  augmentation: true
  use_rgb: true
  use_dem: false
  use_slope: false
  use_segmentation_layer: true
  use_slope_stripes_channel: true
