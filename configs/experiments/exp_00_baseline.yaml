# Experiment 0: Clean baseline with correct IoU threshold
# Hypothesis: Establish reference metrics with BCE on sun-only tiles, no augmentation.
# Expected: ~8-10 min/epoch, ~150 epochs → ~20-25 hours
experiment_name: "exp_00_baseline"
run_intention: "Baseline: BCE, sun tiles, no augment"
mode: "production"

target_mode: "binary"

training:
  loss_function: "bce"
  learning_rate: 0.00002
  batch_size: 16
  num_epochs: 150
  early_stopping_patience: 15
  early_stopping_min_delta: 0
  lr_scheduler_patience: 6
  lr_scheduler_factor: 0.5
  max_grad_norm: 1.0
  max_overfit_gap_ratio: 0.6

data:
  tile_size: 512
  train_subsample_ratio: 1.0
  illumination_filter: "sun"
  augmentation: false
  use_rgb: true
  use_dem: false
  use_slope: false
  use_segmentation_layer: true
