# Experiment 3: BCE + positive-class weight (after exp_02_augmentation weights)
# init_weights_from: best checkpoint from exp_02 (same path each run; sequential --all works).
# If you run exp_03 alone, copy/rename your exp_02 best_model.pt to this path or edit below.
experiment_name: "exp_03_bce_pos_weight"
run_intention: "vs exp02: BCE + pos_weight on lobes"
mode: "production"

init_weights_from: "data/models/production/best_model.pt"

target_mode: "binary"

layers:
  rgb:
    enabled: true
  dem:
    enabled: false
  slope:
    enabled: false
  segmentation:
    enabled: true
  slope_stripes:
    enabled: true

training:
  loss_function: "bce"
  bce_pos_weight: 5.0
  learning_rate: 0.00003
  batch_size: 16
  num_epochs: 150
  early_stopping_patience: 15
  early_stopping_min_delta: 0
  lr_scheduler_patience: 6
  lr_scheduler_factor: 0.5
  max_grad_norm: 1.0
  max_overfit_gap_ratio: 0.6

data:
  tile_size: 512
  train_subsample_ratio: 1.0
  dataloader_num_workers: 0
  illumination_filter: "sun"
  augmentation: true
