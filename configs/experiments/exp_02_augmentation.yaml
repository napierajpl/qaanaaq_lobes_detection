# Experiment 2: Augmentation on sun-only tiles (flips, rotations, color jitter)
# Hypothesis: Augmentation reduces overfitting vs exp_01.
experiment_name: "exp_02_augmentation"
run_intention: "vs exp01: +augment (flip/rot/color)"
mode: "production"

target_mode: "binary"

layers:
  rgb:
    enabled: true
  dem:
    enabled: false
  slope:
    enabled: false
  segmentation:
    enabled: true

training:
  loss_function: "bce"
  learning_rate: 0.00003
  batch_size: 16
  num_epochs: 150
  early_stopping_patience: 15
  early_stopping_min_delta: 0
  lr_scheduler_patience: 6
  lr_scheduler_factor: 0.5
  max_grad_norm: 1.0
  max_overfit_gap_ratio: 0.6

data:
  tile_size: 512
  train_subsample_ratio: 1.0
  illumination_filter: "sun"
  augmentation: true
