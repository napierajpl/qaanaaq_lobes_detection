# Experiment 4: Unfreeze encoder @ epoch 10 (after exp_03; optional init from exp_03 best)
# Set init_weights_from to exp_03 checkpoint if not running full sequence in one go.
experiment_name: "exp_04_unfreeze_encoder"
run_intention: "after exp03: unfreeze encoder @ep10"
mode: "production"

init_weights_from: "data/models/production/best_model.pt"

target_mode: "binary"

layers:
  rgb:
    enabled: true
  dem:
    enabled: false
  slope:
    enabled: false
  segmentation:
    enabled: true
  slope_stripes:
    enabled: true

training:
  loss_function: "bce"
  bce_pos_weight: 5.0
  learning_rate: 0.00003
  batch_size: 16
  num_epochs: 150
  early_stopping_patience: 15
  early_stopping_min_delta: 0
  lr_scheduler_patience: 6
  lr_scheduler_factor: 0.5
  max_grad_norm: 1.0
  max_overfit_gap_ratio: 0.6

model:
  encoder:
    freeze_encoder: true
    unfreeze_after_epoch: 10

data:
  tile_size: 512
  train_subsample_ratio: 1.0
  illumination_filter: "sun"
  augmentation: false
