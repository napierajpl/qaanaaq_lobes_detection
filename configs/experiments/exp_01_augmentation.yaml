# Experiment 1: Add augmentation (flips, rotations, color jitter on ALL train tiles)
# Hypothesis: Augmentation reduces overfitting, improves generalization on 400 tiles.
# Change from baseline: augmentation enabled
experiment_name: "exp_01_augmentation"
run_intention: "vs baseline: +augment (flip/rot/color)"
mode: "production"

target_mode: "binary"

training:
  loss_function: "bce"
  learning_rate: 0.00002
  batch_size: 16
  num_epochs: 150
  early_stopping_patience: 15
  early_stopping_min_delta: 0
  lr_scheduler_patience: 6
  lr_scheduler_factor: 0.5
  max_grad_norm: 1.0
  max_overfit_gap_ratio: 0.6

data:
  tile_size: 512
  train_subsample_ratio: 1.0
  illumination_filter: "sun"
  augmentation: true
  use_rgb: true
  use_dem: false
  use_slope: false
  use_segmentation_layer: true
