# Experiment 3: Add DEM + slope channels alongside RGB
# Hypothesis: Elevation/slope help distinguish lobe boundaries from flat terrain.
# Change from baseline: use_dem=true, use_slope=true
experiment_name: "exp_03_dem_slope"
run_intention: "vs baseline: +DEM +slope channels"
mode: "production"

target_mode: "binary"

training:
  loss_function: "bce"
  learning_rate: 0.00002
  batch_size: 16
  num_epochs: 150
  early_stopping_patience: 15
  early_stopping_min_delta: 0
  lr_scheduler_patience: 6
  lr_scheduler_factor: 0.5
  max_grad_norm: 1.0
  max_overfit_gap_ratio: 0.6

data:
  tile_size: 512
  train_subsample_ratio: 1.0
  illumination_filter: "sun"
  augmentation: false
  use_rgb: true
  use_dem: true
  use_slope: true
  use_segmentation_layer: true
